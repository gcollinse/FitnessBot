[phases.setup]
nixPkgs = ["nodejs_22", "python312", "python312Packages.virtualenv", "postgresql"]

[phases.build]
cmds = [
  "virtualenv /app/.venv",
  "/app/.venv/bin/pip install -r requirements.txt",
  "rm -f package-lock.json",
  "npm install",
  "npm run build"
]

[phases.start]
cmd = "/app/.venv/bin/uvicorn server:app --host 0.0.0.0 --port $PORT"

