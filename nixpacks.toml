[phases.setup]
nixPkgs = ["nodejs_22", "python312"]

[phases.build]
cmds = [
  "curl -sS https://bootstrap.pypa.io/get-pip.py | python3",
  "python3 -m pip install -r requirements.txt",
  "rm -f package-lock.json",
  "npm install",
  "npm run build"
]

[phases.start]
cmd = "python3 -m uvicorn server:app --host 0.0.0.0 --port $PORT"
